<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00fff7">
        <animate attributeName="stop-color"
          values="#00fff7;#ff00ff;#00fff7"
          dur="3s"
          repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#ff00ff">
        <animate attributeName="stop-color"
          values="#ff00ff;#00fff7;#ff00ff"
          dur="3s"
          repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0d0d0d"/>

  <!-- scanline -->
  <rect width="100%" height="2" fill="#00fff7" opacity="0.15">
    <animate attributeName="y" from="0" to="300" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="50%" y="45%" text-anchor="middle"
        font-size="64"
        font-family="Arial Black"
        fill="url(#neon)"
        filter="url(#glow)">
    ALISSA DELATTRE
  </text>

  <text x="50%" y="65%" text-anchor="middle"
        font-size="20"
        fill="#00fff7"
        opacity="0.8"
        filter="url(#glow)">
    GAMEPLAY PROGRAMMER // UNITY // C++ // SYSTEM DESIGN
  </text>

</svg>
