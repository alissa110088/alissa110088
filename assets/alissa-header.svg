<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon gradient -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff">
        <animate attributeName="stop-color"
          values="#00f5ff;#a855f7;#00f5ff"
          dur="4s"
          repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color"
          values="#a855f7;#00f5ff;#a855f7"
          dur="4s"
          repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle floating animation -->
    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 800;
        letter-spacing: 2px;
        animation: float 3s ease-in-out infinite;
      }

      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 400;
        letter-spacing: 4px;
        opacity: 0.85;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f1a"/>

  <!-- Soft stars -->
  <circle cx="120" cy="80" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="980" cy="120" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="700" cy="60" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="400" cy="200" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="900" cy="220" r="2" fill="#ffffff" opacity="0.4"/>

  <!-- Main name -->
  <text x="50%" y="45%"
        text-anchor="middle"
        class="title"
        font-size="64"
        fill="url(#grad)"
        filter="url(#glow)">
    ALISSA DELATTRE
  </text>

  <!-- Subtitle -->
  <text x="50%" y="65%"
        text-anchor="middle"
        class="subtitle"
        font-size="20"
        fill="#cbd5e1">
    GAMEPLAY PROGRAMMER • UNITY • C# • C++
  </text>

</svg>
